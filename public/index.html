<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Request System</h1>
  </header>

  <main>
    <section class="form-section">
      <h2>New Request</h2>
      <form id="request-form">
        <div class="form-group">
          <label for="title">Title <span class="required">*</span></label>
          <input type="text" id="title" placeholder="Short summary of the request" required />
        </div>
        <div class="form-group">
          <label for="description">Description <span class="required">*</span></label>
          <textarea id="description" rows="3" placeholder="Detailed description of the request" required></textarea>
        </div>
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Submit Request</button>
      </form>
    </section>

    <section class="list-section">
      <h2>All Requests</h2>
      <div id="requests-container">
        <p class="empty-msg">No requests yet.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
