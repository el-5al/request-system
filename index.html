<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Request System</h1>
  </header>

  <main>
    <section class="card" id="new-request-section">
      <h2>Submit a New Request</h2>
      <form id="request-form" novalidate>
        <div class="form-group">
          <label for="title">Title <span class="required">*</span></label>
          <input type="text" id="title" name="title" placeholder="Short summary of the request" required maxlength="120" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="category" required>
              <option value="">— Select category —</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
              <option value="Facilities">Facilities</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="priority">Priority <span class="required">*</span></label>
            <select id="priority" name="priority" required>
              <option value="">— Select priority —</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description <span class="required">*</span></label>
          <textarea id="description" name="description" rows="4" placeholder="Describe your request in detail…" required maxlength="1000"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Submit Request</button>
          <button type="reset" class="btn btn-secondary">Clear</button>
        </div>

        <p id="form-error" class="form-error" aria-live="polite"></p>
      </form>
    </section>

    <section class="card" id="requests-section">
      <div class="section-header">
        <h2>Requests</h2>
        <div class="filters">
          <label for="filter-status" class="sr-only">Filter by status</label>
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>

          <label for="filter-category" class="sr-only">Filter by category</label>
          <select id="filter-category">
            <option value="">All Categories</option>
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
            <option value="Facilities">Facilities</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="requests-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="requests-body">
          </tbody>
        </table>
        <p id="empty-message" class="empty-message">No requests found.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
