<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Detail</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand">📋 Request System</span>
        <div class="navbar-links">
            <a href="/">Home</a>
            <a href="/requests">All Requests</a>
            <a href="/submit">New Request</a>
        </div>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1>Request Detail</h1>
            <span class="badge badge-{{ entry.status }}">{{ entry.status }}</span>
        </div>
        <div class="detail-card">
            <div class="detail-row">
                <span class="detail-label">Request ID</span>
                <span class="detail-value mono">{{ entry.id }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Username</span>
                <span class="detail-value">{{ entry.username }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">{{ entry.email }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Submitted</span>
                <span class="detail-value">{{ entry.created_at }}</span>
            </div>
            <div class="detail-row detail-row-full">
                <span class="detail-label">Details</span>
                <p class="detail-body">{{ entry.body }}</p>
            </div>
        </div>
        <div class="action-row">
            <a href="/requests" class="btn btn-secondary">← All Requests</a>
            <a href="/submit" class="btn btn-primary">+ New Request</a>
        </div>
    </div>
</body>
</html>
