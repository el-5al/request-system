<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Request Submitted ✓</h1>
        <p>Thank you, <strong>{{ username }}</strong> ({{ email }})! Your request has been received.</p>
        <div class="card">
            <p><strong>Request:</strong> {{ body }}</p>
        </div>
        <a href="/submit" class="btn">Submit Another</a>
        <a href="/" class="link">← Back to Home</a>
    </div>
</body>
</html>
